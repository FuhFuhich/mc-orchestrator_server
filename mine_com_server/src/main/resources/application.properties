spring.application.name=mine_com_server

# ===== SERVER =====
server.port=8080

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/mc_orchestrator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== ASYNC =====
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mc-async-

# ===== SCHEDULER =====
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=mc-scheduler-

# ===== ENCRYPTION =====
app.encryption.key=zlpYkmFbqynDO6g5G0879oLxEejBcKRQ

# ===== JWT =====
app.jwt.secret=mc_jwt_secret_key_must_be_very_long_for_hs256_algorithm_example
app.jwt.expiration-ms=86400000
app.refresh-token.expiration-days=30

# ===== WEBSOCKET =====
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# ===== LOGGING =====
logging.level.com.example.mine_com_server=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
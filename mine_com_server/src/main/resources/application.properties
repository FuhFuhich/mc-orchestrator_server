spring.application.name=mine_com_server

# ===== SERVER =====
server.port=${SERVER_PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===== DATABASE =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mc_orchestrator}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== ASYNC =====
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mc-async-

# ===== SCHEDULER =====
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=mc-scheduler-

# ===== ENCRYPTION =====
# 32-character AES key for encrypting SSH/RCON credentials at rest.
# MUST be overridden via APP_ENCRYPTION_KEY env variable in production.
app.encryption.key=${APP_ENCRYPTION_KEY:zlpYkmFbqynDO6g5G0879oLxEejBcKRQ}

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:change-me-in-env-with-at-least-32-bytes}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.refresh-token.expiration-days=${APP_REFRESH_TOKEN_EXPIRATION_DAYS:30}

# ===== WEBSOCKET =====
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# ===== CORS =====
# Comma-separated list of allowed origins for CORS and WebSocket.
# Override via APP_CORS_ALLOWED_ORIGINS in production.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ===== LOGGING =====
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.level.com.example.mine_com_server=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ===== FILE UPLOAD LIMITS =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ===== HikariPool =====
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ===== REMOTE NODE PATHS =====
app.remote.root=${APP_REMOTE_ROOT:$HOME/mc-com}

# RAM (tmpfs) path for Docker servers deployed to RAM storage.
app.remote.docker.ram-path=${APP_REMOTE_DOCKER_RAM_PATH:/dev/shm/mc-com/servers}
